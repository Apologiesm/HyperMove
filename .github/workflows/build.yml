name: Build HyperMove EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PySide6

    - name: Compile to Single Executable
      run: |
        pyinstaller --noconfirm --onefile --windowed --icon "logo.ico" --add-data "logo.ico;." --name "HyperMove" "main.py"

    - name: Upload EXE File
      uses: actions/upload-artifact@v4
      with:
        name: HyperMove-Windows-App
        path: dist/HyperMove.exe
